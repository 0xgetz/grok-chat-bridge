name: Decode demo assets
on:
  push:
    branches: [main]
    paths:
      - 'demo-assets/**'
      - '.github/workflows/decode-demo-assets.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Decode base64 parts into images and videos
        run: |
          set -euo pipefail
          shopt -s nullglob
          for man in demo-assets/*.b64.parts; do
            base="${man%.parts}"
            : > "$base"
            while IFS= read -r part; do
              [ -z "$part" ] && continue
              cat "demo-assets/$part" >> "$base"
            done < "$man"
            out="${base%.b64}"
            base64 -d "$base" > "$out"
            echo "Decoded $out ($(wc -c < "$out") bytes)"
            rm -f "$base"
          done
          for b64 in demo-assets/*.b64; do
            out="${b64%.b64}"
            base64 -d "$b64" > "$out"
            echo "Decoded $out ($(wc -c < "$out") bytes)"
          done
          ls -lh demo-assets/*.{jpg,mp4} 2>/dev/null || true
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add decoded demo images and 10s videos"
          file_pattern: 'demo-assets/*.jpg demo-assets/*.mp4'
